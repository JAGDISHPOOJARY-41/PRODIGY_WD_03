<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="game-card" aria-labelledby="gameTitle">
      <p class="eyebrow">Task 3</p>
      <h1 id="gameTitle">Tic-Tac-Toe Web Application</h1>
      <p class="intro">
        Play an interactive tic-tac-toe game with turn tracking, winner detection, draw handling, and a quick reset.
      </p>

      <div class="status-bar">
        <div class="status-chip">
          <span class="status-label">Current Turn</span>
          <strong id="currentPlayer">Player X</strong>
        </div>
        <div class="status-chip">
          <span class="status-label">Game Status</span>
          <strong id="gameStatus">In progress</strong>
        </div>
      </div>

      <section class="board" id="board" aria-label="Tic-tac-toe board">
        <button class="cell" type="button" data-index="0" aria-label="Cell 1"></button>
        <button class="cell" type="button" data-index="1" aria-label="Cell 2"></button>
        <button class="cell" type="button" data-index="2" aria-label="Cell 3"></button>
        <button class="cell" type="button" data-index="3" aria-label="Cell 4"></button>
        <button class="cell" type="button" data-index="4" aria-label="Cell 5"></button>
        <button class="cell" type="button" data-index="5" aria-label="Cell 6"></button>
        <button class="cell" type="button" data-index="6" aria-label="Cell 7"></button>
        <button class="cell" type="button" data-index="7" aria-label="Cell 8"></button>
        <button class="cell" type="button" data-index="8" aria-label="Cell 9"></button>
      </section>

      <div class="actions">
        <button class="btn btn-primary" id="restartBtn" type="button">Restart Game</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
